name: Közösségi oldal létrehozása

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-community-page:
    if: github.event.label.name == 'approve'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and create wiki page
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # --- Parse fields from the GitHub issue form body ---
          # GitHub form issues use "### Label\n\nValue" format
          # Using awk to avoid sed issues with special characters in labels
          parse_field() {
            local label="$1"
            echo "$ISSUE_BODY" | awk -v label="### $label" '
              $0 == label { found=1; next }
              found && /^### / { exit }
              found && NF { print }
            '
          }

          # For multiline fields (body content), preserve empty lines too
          parse_field_multiline() {
            local label="$1"
            echo "$ISSUE_BODY" | awk -v label="### $label" '
              $0 == label { found=1; next }
              found && /^### / { exit }
              found { print }
            ' | sed '1{/^$/d}' | sed '${/^$/d}'
          }

          PAGE_TYPE=$(parse_field "Oldal típusa")
          PAGE_TITLE=$(parse_field "Cím / Név")
          PAGE_DESC=$(parse_field "Rövid leírás")
          PAGE_BODY=$(parse_field_multiline "Részletes leírás")
          PAGE_COORDS=$(parse_field "Koordináták")
          PAGE_DIM=$(parse_field "Dimenzió")
          PAGE_BUILDER=$(parse_field "Építő(k)")
          PAGE_IMAGES=$(parse_field_multiline "Képek")

          echo "Title: $PAGE_TITLE"
          echo "Type: $PAGE_TYPE"

          # --- Generate slug from title ---
          SLUG=$(echo "$PAGE_TITLE" | \
            sed 'y/áéíóöőúüűÁÉÍÓÖŐÚÜŰ/aeiooouuuAEIOOOUUU/' | \
            tr '[:upper:]' '[:lower:]' | \
            sed 's/[^a-z0-9 ]//g' | \
            sed 's/  */ /g' | \
            sed 's/ /-/g' | \
            sed 's/^-//;s/-$//')

          # Append issue number for uniqueness
          SLUG="${SLUG}-${ISSUE_NUMBER}"
          echo "Slug: $SLUG"

          # --- Download images ---
          # Match markdown image URLs, <img src="..."> tags, and bare GitHub attachment URLs
          ALL_URLS=$(echo "$PAGE_IMAGES" | grep -oP '(?:src="|!\[.*?\]\()?\Khttps://[^"\s\)]+' | sort -u || true)

          mkdir -p docs/assets/kozossegi
          IMAGE_MD=""
          IMG_COUNT=0

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            IMG_COUNT=$((IMG_COUNT + 1))

            # Determine extension from Content-Type header, fallback to png
            CONTENT_TYPE=$(curl -sIL "$url" | grep -i '^content-type:' | tail -1 | tr -d '\r')
            case "$CONTENT_TYPE" in
              *jpeg*|*jpg*) EXT=".jpg" ;;
              *gif*)        EXT=".gif" ;;
              *webp*)       EXT=".webp" ;;
              *)            EXT=".png" ;;
            esac

            FILENAME="${SLUG}-${IMG_COUNT}${EXT}"
            echo "Downloading image ${IMG_COUNT}: ${url}"
            curl -sL -o "docs/assets/kozossegi/${FILENAME}" "$url" || true

            IMAGE_MD="${IMAGE_MD}![${PAGE_TITLE} - ${IMG_COUNT}. kép](../assets/kozossegi/${FILENAME}){ loading=lazy }

          "
          done <<< "$ALL_URLS"

          # --- Create the wiki page ---
          TODAY=$(date +%Y-%m-%d)
          PAGE_FILE="docs/kozossegi/${SLUG}.md"

          {
            echo "# ${PAGE_TITLE}"
            echo ""
            echo "> *${PAGE_DESC}*"
            echo ""
            echo "[← Vissza a közösségi oldalakhoz](index.md)"
            echo ""
            echo "---"
            echo ""
            echo '!!! info "Információ"'
            echo "    - **Típus:** ${PAGE_TYPE}"
            echo "    - **Építő(k):** ${PAGE_BUILDER}"
            if [ -n "$PAGE_COORDS" ] && [ "$PAGE_COORDS" != "_No response_" ]; then
              echo "    - **Koordináták:** ${PAGE_COORDS}"
            fi
            if [ -n "$PAGE_DIM" ] && [ "$PAGE_DIM" != "_No response_" ] && [ "$PAGE_DIM" != "None" ]; then
              echo "    - **Dimenzió:** ${PAGE_DIM}"
            fi
            echo "    - **Hozzáadva:** ${TODAY}"
            echo "    - **Beküldő:** @${ISSUE_AUTHOR}"
            echo ""
            echo "---"
            echo ""
            echo "${PAGE_BODY}"
          } > "$PAGE_FILE"

          # Add images section if there are images
          if [ "$IMG_COUNT" -gt 0 ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "## Képek"
              echo ""
              echo "${IMAGE_MD}"
            } >> "$PAGE_FILE"
          fi

          # --- Update community index page ---
          INDEX_FILE="docs/kozossegi/index.md"
          NEW_ROW="| [${PAGE_TITLE}](${SLUG}.md) | ${PAGE_TYPE} | ${PAGE_BUILDER} | ${TODAY} |"

          if [ -f "$INDEX_FILE" ]; then
            echo "$NEW_ROW" >> "$INDEX_FILE"
          fi

          # --- Update mkdocs.yml nav ---
          python3 -c "
          import yaml, sys
          with open('mkdocs.yml', 'r') as f:
              data = yaml.safe_load(f)
          for item in data['nav']:
              if isinstance(item, dict) and 'Közösségi tartalom' in item:
                  item['Közösségi tartalom'].append({'${PAGE_TITLE}': 'kozossegi/${SLUG}.md'})
                  break
          with open('mkdocs.yml', 'w') as f:
              yaml.dump(data, f, allow_unicode=True, default_flow_style=False, sort_keys=False)
          "

          # --- Create branch and PR ---
          BRANCH="kozossegi/${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/kozossegi/ docs/assets/kozossegi/ mkdocs.yml
          git commit -m "Közösségi oldal: ${PAGE_TITLE} (#${ISSUE_NUMBER})"
          git push origin "$BRANCH"

          gh pr create \
            --title "Közösségi oldal: ${PAGE_TITLE}" \
            --body "## Közösségi oldal hozzáadása

          - **Cím:** ${PAGE_TITLE}
          - **Típus:** ${PAGE_TYPE}
          - **Építő(k):** ${PAGE_BUILDER}
          - **Beküldő:** @${ISSUE_AUTHOR}

          Closes #${ISSUE_NUMBER}

          ---
          *Automatikusan generálva az approve címke alapján.*"

          # --- Comment on the issue ---
          PR_URL=$(gh pr view "$BRANCH" --json url -q '.url')
          gh issue comment "$ISSUE_NUMBER" \
            --body "A közösségi oldal elkészült és PR-ként beküldésre került: ${PR_URL} Amint a PR merge-elve lesz, az oldal megjelenik a wikin!"
