name: Deploy Wiki to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new content and notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: "https://tnkarno.github.io/ujvilag-wiki"
        run: |
          set -euo pipefail

          # Skip if no webhook configured
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "No DISCORD_WEBHOOK_URL secret set, skipping."
            exit 0
          fi

          # Get new .md files added in this push
          COMMUNITY_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'docs/kozossegi/*.md' | grep -v 'index.md' || true)
          BLOG_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'docs/blog/posts/*.md' || true)

          send_discord() {
            local content="$1"
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\": $content}" \
              "$DISCORD_WEBHOOK_URL"
          }

          # Notify for each new community page
          for file in $COMMUNITY_FILES; do
            TITLE=$(head -1 "$file" | sed 's/^# //')
            SLUG=$(basename "$file" .md)
            PAGE_URL="${SITE_URL}/kozossegi/${SLUG}/"
            send_discord "$(jq -Rn --arg t "$TITLE" --arg u "$PAGE_URL" \
              '"📄 **Új közösségi oldal a wikin!**\n> **\($t)**\n\($u)"')"
          done

          # Notify for each new blog post
          for file in $BLOG_FILES; do
            TITLE=$(grep -m1 '^# ' "$file" | sed 's/^# //')
            SLUG=$(basename "$file" .md)
            PAGE_URL="${SITE_URL}/blog/${SLUG}/"
            send_discord "$(jq -Rn --arg t "$TITLE" --arg u "$PAGE_URL" \
              '"📰 **Új bejegyzés a wiki blogon!**\n> **\($t)**\n\($u)"')"
          done
